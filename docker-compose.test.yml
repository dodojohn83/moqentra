services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: moqentra_test
      POSTGRES_PASSWORD: moqentra_test
      POSTGRES_DB: moqentra_test
    ports:
      - "15432:5432"
  minio:
    image: minio/minio:RELEASE.2025-07-19T-00-00-00Z
    command: server /data
    environment:
      MINIO_ROOT_USER: minio_test
      MINIO_ROOT_PASSWORD: minio_test
    ports:
      - "19000:9000"
