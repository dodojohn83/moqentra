syntax = "proto3";

package moqentra.dyun.v1;

import "moqentra/common/v1/common.proto";

// Node in a dyun-gu computational graph.
message DyunNode {
  string node_id = 1;
  string operator = 2;
  map<string, string> attrs = 3;
  repeated string inputs = 4;
  repeated string outputs = 5;
}

// Edge connecting two dyun-gu nodes.
message DyunEdge {
  string from_node = 1;
  string from_output = 2;
  string to_node = 3;
  string to_input = 4;
}

// A complete dyun-gu graph bundle.
message DyunGraphBundle {
  string api_version = 1;
  string kind = 2;
  string bundle_id = 3;
  string name = 4;
  repeated DyunNode nodes = 5;
  repeated DyunEdge edges = 6;
  repeated moqentra.common.v1.ResourceRef resources = 7;
}

// Deployment status for a dyun-gu bundle.
message DyunDeploymentStatus {
  string bundle_id = 1;
  string deployment_id = 2;
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_PENDING = 1;
    STATE_SCHEDULING = 2;
    STATE_RUNNING = 3;
    STATE_SUCCEEDED = 4;
    STATE_FAILED = 5;
    STATE_TERMINATING = 6;
  }
  State state = 3;
  string message = 4;
}
