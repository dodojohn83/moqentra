syntax = "proto3";

package moqentra.worker.v1;

import "google/protobuf/timestamp.proto";
import "moqentra/common/v1/common.proto";

// A supported ML framework.
message Framework {
  string name = 1;
  string version = 2;
}

// A supported model serialization format.
message ModelFormat {
  string name = 1;
  repeated string version = 2;
}

// Worker capabilities reported during agent handshake.
message WorkerCapabilities {
  string agent_build_version = 1;
  string contract_version = 2;
  repeated Framework frameworks = 3;
  string hardware_label = 4;
  repeated string device_labels = 5;
  string driver_version = 6;
  string runtime_version = 7;
  repeated string runtimes = 8;
  repeated ModelFormat model_formats = 9;
  string collective_backend = 10;
  uint64 device_memory_bytes = 11;
  uint32 max_parallelism = 12;
  bool supports_gpu = 13;
  bool supports_npu = 14;
}

// Agent hello sent when a worker connects.
message Hello {
  string node_id = 1;
  string agent_version = 2;
  WorkerCapabilities capabilities = 3;
}

// Periodic heartbeat from agent to control plane.
message Heartbeat {
  uint64 sequence = 1;
  google.protobuf.Timestamp timestamp = 2;
}

// Lease granted by the control plane for a task.
message Lease {
  string lease_id = 1;
  string task_id = 2;
  string attempt_id = 3;
  google.protobuf.Timestamp deadline = 4;
}

// Command sent from control plane to agent.
message Command {
  string command_id = 1;
  string command_type = 2;
  bytes payload = 3;
  google.protobuf.Timestamp deadline = 4;
}

// Acknowledgement that a command was received by the agent.
message Ack {
  string command_id = 1;
  AckStatus status = 2;
}

enum AckStatus {
  ACK_STATUS_UNSPECIFIED = 0;
  ACK_STATUS_RECEIVED = 1;
  ACK_STATUS_REJECTED = 2;
}

// Progress update for a command.
message Progress {
  string command_id = 1;
  uint32 percent_complete = 2;
  string message = 3;
}

// Chunk of logs emitted by an agent.
message LogChunk {
  string command_id = 1;
  bytes data = 2;
}

// Metric sample.
message MetricSample {
  string name = 1;
  double value = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> labels = 4;
}

message MetricBatch {
  string command_id = 1;
  repeated MetricSample samples = 2;
}

// Final result for a command.
message Result {
  string command_id = 1;
  bool success = 2;
  bytes payload = 3;
  moqentra.common.v1.Error error = 4;
}

// Drain request for graceful shutdown or per-command cancellation.
message Drain {
  bool graceful = 1;
  // When set, the drain applies to a specific command rather than the whole node.
  string command_id = 2;
}

// One frame sent by the agent to the control plane.
message WorkerAgentServiceOpenStreamRequest {
  oneof payload {
    Hello hello = 1;
    Heartbeat heartbeat = 2;
    Ack ack = 3;
    Progress progress = 4;
    LogChunk log_chunk = 5;
    MetricBatch metric_batch = 6;
    Result result = 7;
  }
}

// One frame sent by the control plane to the agent.
message WorkerAgentServiceOpenStreamResponse {
  oneof payload {
    Command command = 1;
    Lease lease = 2;
    Drain drain = 3;
    moqentra.common.v1.Error error = 4;
  }
}

// Bidirectional worker/agent stream.
service WorkerAgentService {
  rpc OpenStream(stream WorkerAgentServiceOpenStreamRequest) returns (stream WorkerAgentServiceOpenStreamResponse);
}
