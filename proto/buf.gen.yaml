version: v1
managed:
  enabled: true
  go_package_prefix: github.com/dodojohn83/moqentra/gen/go
plugins:
  - plugin: prost
    out: ../crates/contracts/src/generated
    opt:
      - compile_well_known_types
  - plugin: prost-crate
    out: ../crates/contracts/src/generated
    opt:
      - no_features
