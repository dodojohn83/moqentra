openapi: 3.1.0
info:
  title: Moqentra API
  version: 0.1.0
  description: Northbound HTTP API for Moqentra.

servers:
  - url: /

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      operationId: getReady
      summary: Readiness probe
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /v1/whoami:
    get:
      operationId: whoAmI
      summary: Resolve authenticated principal
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: Principal context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoAmIResponse'

  /v1/applications:compile:
    post:
      operationId: compileApplication
      summary: Compile an application graph
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileRequest'
      responses:
        '200':
          description: Compiled graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompileResponse'

  /v1/datasets:
    get:
      operationId: listDatasets
      summary: List datasets for tenant
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageOffset'
      responses:
        '200':
          description: Dataset list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
    post:
      operationId: createDataset
      summary: Create dataset
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'

  /v1/datasets/{id}:
    get:
      operationId: getDataset
      summary: Get dataset by id
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dataset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'

  /v1/experiments:
    get:
      operationId: listExperiments
      summary: List experiments
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageOffset'
      responses:
        '200':
          description: Experiment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
    post:
      operationId: createExperiment
      summary: Create experiment
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperimentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentResponse'

  /v1/training-jobs:
    get:
      operationId: listTrainingJobs
      summary: List training jobs
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageOffset'
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
    post:
      operationId: createTrainingJob
      summary: Create training job
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainingJobRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'

  /v1/training-jobs/{id}/admit:
    post:
      operationId: admitTrainingJob
      summary: Admit a training job
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job admitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'

  /v1/training-jobs/{id}/cancel:
    post:
      operationId: cancelTrainingJob
      summary: Cancel a training job
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'

  /v1/dataset-versions:
    post:
      operationId: createDatasetVersion
      summary: Create dataset version
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetVersionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersionResponse'

  /v1/dataset-versions/{id}/assets:
    post:
      operationId: addDatasetVersionAsset
      summary: Add an asset to a draft dataset version
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAssetRequest'
      responses:
        '200':
          description: Asset added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersionResponse'

  /v1/dataset-versions/{id}/splits:
    post:
      operationId: generateDatasetVersionSplits
      summary: Generate deterministic train/val/test splits
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSplitsRequest'
      responses:
        '200':
          description: Splits generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersionResponse'

  /v1/dataset-versions/{id}/publish:
    post:
      operationId: publishDatasetVersion
      summary: Publish a dataset version
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersionResponse'

  /v1/upload-sessions:
    post:
      operationId: createUploadSession
      summary: Create a multipart upload session
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionResponse'

  /v1/upload-sessions/{id}:
    get:
      operationId: getUploadSession
      summary: Get upload session
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionResponse'
    delete:
      operationId: abortUploadSession
      summary: Abort an upload session
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Aborted

  /v1/upload-sessions/{id}/parts:
    get:
      operationId: listUploadSessionParts
      summary: List upload session parts
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionResponse'

  /v1/upload-sessions/{id}/part-urls:
    get:
      operationId: listPartUploadUrls
      summary: List signed URLs for uploading parts
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed part upload URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UploadPartUrl'

  /v1/upload-sessions/{id}/parts/{partNumber}:
    post:
      operationId: uploadPart
      summary: Upload a part
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: partNumber
          in: path
          required: true
          schema:
            type: integer
        - name: sig
          in: query
          required: false
          schema:
            type: string
        - name: expires
          in: query
          required: false
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: Part uploaded

  /v1/upload-sessions/{id}/complete:
    post:
      operationId: completeUploadSession
      summary: Complete an upload session
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionResponse'

  /v1/import-jobs:
    post:
      operationId: createImportJob
      summary: Create an S3/MinIO import job
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportJobRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'

  /v1/import-jobs/{id}:
    get:
      operationId: getImportJob
      summary: Get import job status
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Import job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'
    delete:
      operationId: cancelImportJob
      summary: Cancel an import job
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Cancelled

  /v1/models:
    get:
      operationId: listModels
      summary: List models
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageOffset'
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
    post:
      operationId: createModel
      summary: Create model family
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResponse'

  /v1/annotation-projects:
    post:
      operationId: createAnnotationProject
      summary: Create annotation project
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnnotationProjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationProjectResponse'

  /v1/annotation-projects/{id}/activate:
    post:
      operationId: activateAnnotationProject
      summary: Activate annotation project
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationProjectResponse'

  /v1/outbox:
    get:
      operationId: listOutboxEvents
      summary: List outbox events
      parameters:
        - $ref: '#/components/parameters/XTenantId'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageOffset'
      responses:
        '200':
          description: Outbox event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'

components:
  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string

    Authorization:
      name: Authorization
      in: header
      required: false
      schema:
        type: string

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string

    PageLimit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

    PageOffset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        service:
          type: string

    ReadyResponse:
      type: object
      required: [status, ready]
      properties:
        status:
          type: string
        ready:
          type: boolean

    WhoAmIResponse:
      type: object
      required: [tenant_id, request_id]
      properties:
        principal:
          type: object
        tenant_id:
          type: string
        request_id:
          type: string

    CompileRequest:
      type: object
      properties:
        spec:
          type: object

    CompileResponse:
      type: object
      required: [digest, edge_count, node_count, capabilities]
      properties:
        digest:
          type: string
        edge_count:
          type: integer
        node_count:
          type: integer
        capabilities:
          type: array
          items:
            type: string

    CreateDatasetRequest:
      type: object
      required: [name, project_id]
      properties:
        name:
          type: string
        project_id:
          type: string

    DatasetResponse:
      type: object
      required: [id, tenant_id, project_id, name, state]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        state:
          type: string

    CreateExperimentRequest:
      type: object
      required: [name, project_id, dataset_version_id, target_metric]
      properties:
        name:
          type: string
        project_id:
          type: string
        dataset_version_id:
          type: string
        target_metric:
          type: string

    ExperimentResponse:
      type: object
      required: [id, name, state]
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string

    CreateTrainingJobRequest:
      type: object
      required: [experiment_id, project_id, code_digest, image_digest, dataset_version_id, argv]
      properties:
        experiment_id:
          type: string
        project_id:
          type: string
        code_digest:
          type: string
        image_digest:
          type: string
        dataset_version_id:
          type: string
        argv:
          type: array
          items:
            type: string

    TrainingJobResponse:
      type: object
      required: [id, experiment_id, state]
      properties:
        id:
          type: string
        experiment_id:
          type: string
        state:
          type: string

    CreateDatasetVersionRequest:
      type: object
      required: [dataset_id]
      properties:
        dataset_id:
          type: string

    AddAssetRequest:
      type: object
      required: [name, object_key, digest, size, media_type]
      properties:
        name:
          type: string
        object_key:
          type: string
        digest:
          type: string
        size:
          type: integer
          format: int64
        media_type:
          type: string
        metadata:
          type: object

    GenerateSplitsRequest:
      type: object
      required: [seed, train, val, test]
      properties:
        seed:
          type: integer
          format: int64
        train:
          type: number
          format: double
        val:
          type: number
          format: double
        test:
          type: number
          format: double

    DatasetVersionResponse:
      type: object
      required: [id, dataset_id, state]
      properties:
        id:
          type: string
        dataset_id:
          type: string
        state:
          type: string
        manifest_digest:
          type: string
          nullable: true

    CreateUploadSessionRequest:
      type: object
      required: [resource_type, resource_id, version_id, name, media_type, part_size, total_size]
      properties:
        resource_type:
          type: string
        resource_id:
          type: string
        version_id:
          type: string
        name:
          type: string
        media_type:
          type: string
        part_size:
          type: integer
          format: int64
        total_size:
          type: integer
          format: int64
        ttl_seconds:
          type: integer
          format: int64

    UploadSessionResponse:
      type: object
      required: [id, target_key, media_type, part_size, total_size, parts, state, expires_at]
      properties:
        id:
          type: string
        target_key:
          type: string
        media_type:
          type: string
        part_size:
          type: integer
          format: int64
        total_size:
          type: integer
          format: int64
        parts:
          type: array
          items:
            $ref: '#/components/schemas/UploadPartInfo'
        state:
          type: string
        expires_at:
          type: string

    UploadPartInfo:
      type: object
      required: [part_number, size, completed]
      properties:
        part_number:
          type: integer
        size:
          type: integer
          format: int64
        completed:
          type: boolean

    UploadPartUrl:
      type: object
      required: [part_number, upload_url, expires_at]
      properties:
        part_number:
          type: integer
        upload_url:
          type: string
        expires_at:
          type: string

    CreateImportJobRequest:
      type: object
      required: [source_url, target_key, media_type, total_bytes]
      properties:
        source_url:
          type: string
        target_key:
          type: string
        media_type:
          type: string
        total_bytes:
          type: integer
          format: int64
        concurrency:
          type: integer
        deadline_seconds:
          type: integer

    ImportJobResponse:
      type: object
      required: [id, state, source_url, target_key, media_type, total_bytes, transferred_bytes, concurrency, deadline_seconds, retry_count]
      properties:
        id:
          type: string
        state:
          type: string
        source_url:
          type: string
        target_key:
          type: string
        media_type:
          type: string
        total_bytes:
          type: integer
          format: int64
        transferred_bytes:
          type: integer
          format: int64
        concurrency:
          type: integer
        deadline_seconds:
          type: integer
        digest:
          type: string
          nullable: true
        failure:
          type: string
          nullable: true
        retry_count:
          type: integer

    CreateModelRequest:
      type: object
      required: [name, project_id]
      properties:
        name:
          type: string
        project_id:
          type: string

    ModelResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    CreateAnnotationProjectRequest:
      type: object
      required: [name, project_id, dataset_version_id, task_type]
      properties:
        name:
          type: string
        project_id:
          type: string
        dataset_version_id:
          type: string
        task_type:
          type: string

    AnnotationProjectResponse:
      type: object
      required: [id, name, state]
      properties:
        id:
          type: string
        name:
          type: string
        state:
          type: string

    Page:
      type: object
      required: [items, total, offset, limit]
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    OutboxEvent:
      type: object
      properties:
        id:
          type: string
        aggregate_type:
          type: string
        aggregate_id:
          type: string
        event_type:
          type: string
        payload:
          type: object

    Operation:
      type: object
      required: [id, state]
      properties:
        id:
          type: string
        state:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        resourceRef:
          type: string
        error:
          $ref: '#/components/schemas/ProblemDetails'

    ProblemDetails:
      type: object
      required: [type, title, status, detail, code]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        violations:
          type: array
          items:
