openapi: 3.1.0
info:
  title: Moqentra API
  version: 0.1.0
  description: Northbound HTTP API for Moqentra.

servers:
  - url: /api/v1

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
  /readyz:
    get:
      operationId: getReady
      summary: Readiness probe
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
  /whoami:
    get:
      operationId: whoAmI
      summary: Resolve authenticated principal
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Principal context
  /datasets:
    get:
      operationId: listDatasets
      summary: List datasets for tenant
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dataset list
    post:
      operationId: createDatasetV1
      summary: Create dataset
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
  /experiments:
    get:
      operationId: listExperiments
      summary: List experiments
      responses:
        '200':
          description: Experiment list
    post:
      operationId: createExperiment
      summary: Create experiment
      responses:
        '201':
          description: Created
  /training-jobs:
    get:
      operationId: listTrainingJobs
      summary: List training jobs
      responses:
        '200':
          description: Job list
    post:
      operationId: createTrainingJob
      summary: Create training job
      responses:
        '201':
          description: Created
  /models:
    get:
      operationId: listModels
      summary: List models
      responses:
        '200':
          description: Model list
    post:
      operationId: createModel
      summary: Create model family
      responses:
        '201':
          description: Created
  /annotation-projects:
    post:
      operationId: createAnnotationProject
      summary: Create annotation project
      responses:
        '201':
          description: Created

  /tenants/{tenantId}/projects:
    get:
      operationId: listProjects
      summary: List projects
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'

    post:
      operationId: createProject
      summary: Create project
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSpec'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '409':
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /tenants/{tenantId}/projects/{projectId}/datasets:
    post:
      operationId: createDataset
      summary: Create dataset
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetManifest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetManifest'

  /tenants/{tenantId}/projects/{projectId}/training-jobs:
    post:
      operationId: createTrainingJob
      summary: Create training job
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingJobSpec'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'

  /operations/{operationId}:
    get:
      operationId: getOperation
      summary: Get operation status
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Operation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'

components:
  schemas:
    Page:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer

    ProjectSpec:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    DatasetManifest:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        spec:
          type: object

    TrainingJobSpec:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        spec:
          type: object

    Operation:
      type: object
      required: [id, state]
      properties:
        id:
          type: string
        state:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        resourceRef:
          type: string
        error:
          $ref: '#/components/schemas/ProblemDetails'

    Metadata:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              description:
                type: string
