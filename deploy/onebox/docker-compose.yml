services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moqentra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moqentra}
      POSTGRES_DB: ${POSTGRES_DB:-moqentra}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moqentra} -d ${POSTGRES_DB:-moqentra}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-18T21-56-31Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  oidc:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: dex serve /etc/dex/config.yaml
    ports:
      - "${OIDC_PORT:-5556}:5556"
    env_file:
      - .env
    volumes:
      - ./oidc-config.yaml:/etc/dex/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust
      args:
        - BIN=moqentra-migrate
        - PORT=8080
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-moqentra}:${POSTGRES_PASSWORD:-moqentra}@postgres:5432/${POSTGRES_DB:-moqentra}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust
      args:
        - BIN=moqentra-control-plane
        - PORT=8080
    environment:
      MOQENTRA_LISTEN_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-moqentra}:${POSTGRES_PASSWORD:-moqentra}@postgres:5432/${POSTGRES_DB:-moqentra}
      MOQENTRA_S3_ENDPOINT: http://minio:9000
      MOQENTRA_S3_BUCKET: ${MOQENTRA_S3_BUCKET:-moqentra}
      MOQENTRA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MOQENTRA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MOQENTRA_S3_FORCE_PATH_STYLE: "true"
      MOQENTRA_OIDC_ISSUER: http://oidc:5556/dex
      MOQENTRA_OIDC_AUDIENCE: moqentra
      MOQENTRA_REQUIRE_AUTH: ${MOQENTRA_REQUIRE_AUTH:-false}
      MOQENTRA_UPLOAD_SIG_SECRET: ${MOQENTRA_UPLOAD_SIG_SECRET:-onebox-dev-upload-secret-change-me}
      MOQENTRA_SCHEDULER_URL: http://scheduler:8082
      MOQENTRA_NODE_AGENT_URL: http://node-agent:8081
    ports:
      - "${CONTROL_PLANE_PORT:-8080}:8080"
    depends_on:
      migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      oidc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/readyz || curl -fs http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  scheduler:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust
      args:
        - BIN=moqentra-scheduler-agent
        - PORT=8082
    environment:
      MOQENTRA_SCHEDULER_ADDR: 0.0.0.0:8082
      MOQENTRA_DATABASE_DSN: postgres://${POSTGRES_USER:-moqentra}:${POSTGRES_PASSWORD:-moqentra}@postgres:5432/${POSTGRES_DB:-moqentra}
      MOQENTRA_CONTROL_PLANE_URL: http://control-plane:8080
    depends_on:
      migration:
        condition: service_completed_successfully
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-3000}:80"
    environment:
      VITE_API_BASE_URL: http://localhost:${CONTROL_PLANE_PORT:-8080}
      VITE_OIDC_ISSUER: http://localhost:${OIDC_PORT:-5556}/dex
    depends_on:
      control-plane:
        condition: service_healthy

  node-agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust
      args:
        - BIN=moqentra-node-agent
        - PORT=8081
    environment:
      MOQENTRA_NODE_AGENT_ADDR: 0.0.0.0:8081
      MOQENTRA_CONTROL_PLANE_URL: http://control-plane:8080
      MOQENTRA_WORKSPACE_ROOT: /var/lib/moqentra
      MOQENTRA_CONTAINER_RUNTIME: ${MOQENTRA_CONTAINER_RUNTIME:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nodeagent-data:/var/lib/moqentra
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  dyun-agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust
      args:
        - BIN=moqentra-dyun-agent
        - PORT=8083
    environment:
      MOQENTRA_DYUN_AGENT_ADDR: 0.0.0.0:8083
      MOQENTRA_DYUN_SANDBOX: /var/lib/moqentra-dyun
      MOQENTRA_S3_BUCKET: moqentra
      MOQENTRA_S3_ENDPOINT: http://minio:9000
      MOQENTRA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MOQENTRA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MOQENTRA_S3_FORCE_PATH_STYLE: "true"
    volumes:
      - dyun-data:/var/lib/moqentra-dyun
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
  nodeagent-data:
  dyun-data:
