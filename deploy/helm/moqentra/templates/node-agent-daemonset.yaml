apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "moqentra.fullname" . }}-node-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "moqentra.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: node-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: node-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "moqentra.fullname" . }}-node-agent
      # Do not mount host Docker socket by default (R1-HELM-003).
      hostNetwork: false
      hostPID: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: node-agent
          image: "{{ .Values.nodeAgent.image.repository }}:{{ .Values.nodeAgent.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: MOQENTRA_NODE_AGENT_ADDR
              value: "0.0.0.0:8081"
            - name: MOQENTRA_CONTROL_PLANE_URL
              value: {{ .Values.controlPlaneUrl | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.nodeAgent.resources | nindent 12 }}
