productionMode: true
tls:
  enabled: true
external:
  db: true
  s3: true
  oidc: true
networkPolicy:
  enabled: true
podDisruptionBudget:
  enabled: true
  minAvailable: 1
image:
  pullPolicy: IfNotPresent
  # Pin digests in real releases, e.g. repository@sha256:...
  tag: "0.1.0"
resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 2Gi
