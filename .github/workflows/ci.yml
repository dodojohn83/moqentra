name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rust QA gate
        run: ./tools/run-rust-qa.sh
      - name: Upload Rust QA reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-qa-reports
          path: target/test-reports/
          retention-days: 14
